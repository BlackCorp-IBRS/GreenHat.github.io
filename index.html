<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Black Corp • BookHub</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      height:100vh;
      background:#050505;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      color:white;
    }

    /* Fundo Glow */
    body::before{
      content:"";
      position:absolute;
      width:600px;
      height:600px;
      background:radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
      filter:blur(40px);
      animation:pulse 5s infinite ease-in-out;
    }

    @keyframes pulse{
      0%{ transform:scale(1);}
      50%{ transform:scale(1.15);}
      100%{ transform:scale(1);}
    }

    .container{
      position:relative;
      z-index:2;
      width:90%;
      max-width:400px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:20px;
    }

    .logo{
      margin-bottom:30px;
      text-align:center;
    }

    .logo h1{
      font-size:2rem;
      letter-spacing:4px;
      font-weight:800;
    }

    .logo span{
      color:#9d9d9d;
      font-size:0.9rem;
      letter-spacing:2px;
    }

    .btn{
      width:100%;
      text-decoration:none;
      color:white;
      padding:18px;
      border:1px solid rgba(255,255,255,0.12);
      border-radius:18px;
      background:rgba(255,255,255,0.05);
      backdrop-filter:blur(10px);
      text-align:center;
      font-weight:700;
      letter-spacing:1px;
      transition:0.3s ease;
      position:relative;
      overflow:hidden;
    }

    .btn:hover{
      transform:translateY(-4px) scale(1.02);
      border-color:white;
      background:rgba(255,255,255,0.1);
      box-shadow:0 0 25px rgba(255,255,255,0.15);
    }

    .btn::before{
      content:"";
      position:absolute;
      top:0;
      left:-100%;
      width:100%;
      height:100%;
      background:linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,0.15),
        transparent
      );
      transition:0.6s;
    }

    .btn:hover::before{
      left:100%;
    }

    .footer{
      margin-top:20px;
      font-size:0.75rem;
      opacity:0.4;
      letter-spacing:2px;
    }

  </style>
</head>

<body>

  <div class="container">

    <div class="logo">
      <h1>BLACK CORP</h1>
      <span>BOOKHUB</span>
    </div>

    <a href="#" class="btn">TESTE 01</a>

    <a href="#" class="btn">TESTE 02</a>

    <a href="#" class="btn">TESTE 03</a>

    <div class="footer">
      IBRS ECOSYSTEM
    </div>

  </div>

</body>
</html>
