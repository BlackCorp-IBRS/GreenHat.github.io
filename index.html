<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BOOKHUB • Black Corp</title>

  <!-- FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    :root{
      --gold:#ffb400;
      --gold-soft:#ffcc48;
      --bg:#040404;
      --line:#382600;
      --white:#f5f5f5;

      /* COR OFICIAL DO SMILE */
      --brand:#d7ff00;
    }

    body{
      font-family:'Orbitron',sans-serif;
      background: radial-gradient(circle at top, #111 0%, #050505 45%, #000 100%);
      min-height:100vh;
      overflow-x:hidden;
      color:white;
      position:relative;
    }

    /* GRID FUTURISTA */
    body::before{
      content:'';
      position:fixed;
      inset:0;
      background:
      linear-gradient(rgba(255,180,0,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,180,0,.04) 1px, transparent 1px);
      background-size:60px 60px;
      pointer-events:none;
      opacity:.25;
    }

    /* PARTÍCULAS */
    body::after{
      content:'';
      position:fixed;
      inset:0;
      background-image:
      radial-gradient(circle, rgba(255,180,0,.8) 1px, transparent 1px);
      background-size:120px 120px;
      opacity:.15;
      animation: float 14s linear infinite;
      pointer-events:none;
    }

    @keyframes float{
      from{
        transform:translateY(0px);
      }
      to{
        transform:translateY(-120px);
      }
    }

    .corner{
      position:fixed;
      width:70px;
      height:70px;
      border:2px solid rgba(255,180,0,.4);
      z-index:2;
      opacity:.7;
    }

    .tl{
      top:25px;
      left:25px;
      border-right:none;
      border-bottom:none;
    }

    .tr{
      top:25px;
      right:25px;
      border-left:none;
      border-bottom:none;
    }

    .bl{
      bottom:25px;
      left:25px;
      border-right:none;
      border-top:none;
    }

    .br{
      bottom:25px;
      right:25px;
      border-left:none;
      border-top:none;
    }

    .container{
      width:100%;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:40px 20px;
      position:relative;
      z-index:5;
    }

    .content{
      width:100%;
      max-width:820px;
      text-align:center;
    }

    /* LOGO */
    .logo-wrap{
      position:relative;
      width:240px;
      height:240px;
      margin:0 auto 30px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .logo-ring{
      position:absolute;
      width:100%;
      height:100%;
      border-radius:50%;
      border:3px solid var(--gold);
      box-shadow:
      0 0 10px var(--gold),
      0 0 30px rgba(255,180,0,.7),
      inset 0 0 20px rgba(255,180,0,.4);
      animation:pulse 3s infinite ease-in-out;
    }

    .logo-ring::before{
      content:'';
      position:absolute;
      inset:-12px;
      border-radius:50%;
      border:1px solid rgba(255,180,0,.25);
    }

    @keyframes pulse{
      0%,100%{
        transform:scale(1);
      }
      50%{
        transform:scale(1.03);
      }
    }

    .book{
      width:120px;
      filter:
      drop-shadow(0 0 10px rgba(255,180,0,.6))
      drop-shadow(0 0 30px rgba(255,180,0,.4));
    }

    .brand-smile{
      position:absolute;
      width:42px;
      bottom:62px;
      right:66px;
      filter:
      drop-shadow(0 0 8px rgba(215,255,0,.8))
      drop-shadow(0 0 20px rgba(215,255,0,.5));
    }

    h1{
      font-size:5rem;
      letter-spacing:12px;
      color:#fff;
      margin-bottom:10px;
      text-shadow:
      0 0 10px rgba(255,255,255,.6),
      0 0 25px rgba(255,180,0,.5);
    }

    .subtitle{
      color:#cfcfcf;
      letter-spacing:8px;
      font-size:1rem;
      margin-bottom:55px;
    }

    .subtitle span{
      color:var(--gold);
    }

    .buttons{
      display:flex;
      flex-direction:column;
      gap:28px;
    }

    .btn{
      width:100%;
      padding:32px 38px;
      background:rgba(0,0,0,.55);
      border:1px solid rgba(255,180,0,.35);
      color:white;
      text-decoration:none;
      display:flex;
      align-items:center;
      justify-content:space-between;
      position:relative;
      overflow:hidden;
      clip-path:polygon(
      18px 0,
      calc(100% - 18px) 0,
      100% 18px,
      100% calc(100% - 18px),
      calc(100% - 18px) 100%,
      18px 100%,
      0 calc(100% - 18px),
      0 18px
      );
      transition:.35s;
      backdrop-filter:blur(6px);
    }

    .btn::before{
      content:'';
      position:absolute;
      top:0;
      left:-120%;
      width:100%;
      height:100%;
      background:linear-gradient(
      90deg,
      transparent,
      rgba(255,180,0,.15),
      transparent
      );
      transition:.7s;
    }

    .btn:hover::before{
      left:120%;
    }

    .btn:hover{
      transform:translateY(-4px) scale(1.01);
      border-color:var(--gold);
      box-shadow:
      0 0 20px rgba(255,180,0,.25),
      0 0 45px rgba(255,180,0,.12);
    }

    .btn-left{
      display:flex;
      align-items:center;
      gap:26px;
    }

    .icon{
      width:34px;
      height:34px;
      color:var(--gold);
      flex-shrink:0;
    }

    .divider{
      width:1px;
      height:44px;
      background:rgba(255,180,0,.18);
    }

    .btn-text{
      font-size:1.3rem;
      letter-spacing:7px;
      font-weight:500;
    }

    .arrow{
      font-size:2rem;
      color:var(--gold);
      transition:.3s;
    }

    .btn:hover .arrow{
      transform:translateX(8px);
    }

    .footer{
      margin-top:55px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:14px;
      opacity:.9;
    }

    .footer p{
      letter-spacing:8px;
      color:var(--gold);
      font-size:.95rem;
    }

    .footer img{
      width:32px;
      filter:
      drop-shadow(0 0 8px rgba(215,255,0,.7));
    }

    /* MOBILE */
    @media(max-width:768px){

      h1{
        font-size:2.9rem;
        letter-spacing:6px;
      }

      .subtitle{
        font-size:.75rem;
        letter-spacing:4px;
      }

      .btn{
        padding:24px 22px;
      }

      .btn-text{
        font-size:.95rem;
        letter-spacing:4px;
      }

      .logo-wrap{
        width:190px;
        height:190px;
      }

      .book{
        width:100px;
      }

      .brand-smile{
        width:34px;
        bottom:49px;
        right:54px;
      }

      .divider{
        display:none;
      }

      .btn-left{
        gap:18px;
      }

    }

  </style>
</head>
<body>

  <!-- BORDAS -->
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <main class="container">

    <section class="content">

      <!-- LOGO -->
      <div class="logo-wrap">

        <div class="logo-ring"></div>

        <!-- LIVRO -->
        <svg class="book" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">

          <path d="M140 110L255 145V400L140 365V110Z"
          stroke="#ffb400"
          stroke-width="12"/>

          <path d="M372 110L257 145V400L372 365V110Z"
          stroke="#ffb400"
          stroke-width="12"/>

          <path d="M255 145C255 145 215 110 140 110"
          stroke="#ffcc48"
          stroke-width="12"/>

          <path d="M257 145C257 145 297 110 372 110"
          stroke="#ffcc48"
          stroke-width="12"/>

          <path d="M255 145V400"
          stroke="#ffcc48"
          stroke-width="12"/>

        </svg>

        <!-- SMILE MARCA -->
        <img
          src="smile.png"
          class="brand-smile"
          alt="Black Corp Symbol"
        >

      </div>

      <!-- TITULO -->
      <h1>BOOKHUB</h1>

      <div class="subtitle">
        POWERED BY <span>BLACK CORP</span>
      </div>

      <!-- BOTÕES -->
      <div class="buttons">

        <a href="#" class="btn">

          <div class="btn-left">

            <!-- ICON -->
            <svg class="icon" fill="none" stroke="currentColor" stroke-width="2"
            viewBox="0 0 24 24">
              <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/>
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
            </svg>

            <div class="divider"></div>

            <div class="btn-text">
              ACESSAR BIBLIOTECA
            </div>

          </div>

          <div class="arrow">›</div>

        </a>

        <a href="#" class="btn">

          <div class="btn-left">

            <svg class="icon" fill="none" stroke="currentColor" stroke-width="2"
            viewBox="0 0 24 24">
              <path d="M22 2L11 13"/>
              <path d="M22 2L15 22L11 13L2 9L22 2Z"/>
            </svg>

            <div class="divider"></div>

            <div class="btn-text">
              ENTRAR NO TELEGRAM
            </div>

          </div>

          <div class="arrow">›</div>

        </a>

        <a href="#" class="btn">

          <div class="btn-left">

            <svg class="icon" fill="none" stroke="currentColor" stroke-width="2"
            viewBox="0 0 24 24">
              <rect x="5" y="11" width="14" height="10" rx="2"/>
              <path d="M8 11V7a4 4 0 118 0v4"/>
            </svg>

            <div class="divider"></div>

            <div class="btn-text">
              DESBLOQUEAR ACESSO
            </div>

          </div>

          <div class="arrow">›</div>

        </a>

      </div>

      <!-- FOOTER -->
      <div class="footer">

        <p>IBRS ECOSYSTEM</p>

        <img src="smile.png" alt="Black Corp">

      </div>

    </section>

  </main>

</body>
</html>
