```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>BOOKHUB • Black Corp</title>

  <!-- Fonte -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      width:100%;
      height:100vh;
      overflow:hidden;
      background:#050505;
      font-family:'Orbitron', sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      position:relative;
      color:white;
    }

    /* Partículas */

    .particles{
      position:absolute;
      width:100%;
      height:100%;
      overflow:hidden;
      z-index:1;
    }

    .particles span{
      position:absolute;
      display:block;
      width:2px;
      height:2px;
      background:#ffb300;
      border-radius:50%;
      opacity:0.2;
      animation:float linear infinite;
    }

    @keyframes float{
      from{
        transform:translateY(100vh);
      }

      to{
        transform:translateY(-10vh);
      }
    }

    /* Glow Central */

    .glow{
      position:absolute;
      width:500px;
      height:500px;
      background:radial-gradient(circle,
      rgba(255,179,0,0.25) 0%,
      rgba(255,179,0,0.08) 35%,
      transparent 70%);
      filter:blur(40px);
      animation:pulse 5s ease-in-out infinite;
      z-index:0;
    }

    @keyframes pulse{
      0%,100%{
        transform:scale(1);
      }

      50%{
        transform:scale(1.1);
      }
    }

    /* Container */

    .container{
      position:relative;
      z-index:2;
      width:90%;
      max-width:420px;
      display:flex;
      flex-direction:column;
      align-items:center;
    }

    /* Logo */

    .logo{
      width:170px;
      margin-bottom:25px;
      animation:logoFloat 4s ease-in-out infinite;
      filter:
      drop-shadow(0 0 15px rgba(255,179,0,0.3))
      drop-shadow(0 0 30px rgba(255,179,0,0.15));
    }

    @keyframes logoFloat{
      0%,100%{
        transform:translateY(0px);
      }

      50%{
        transform:translateY(-6px);
      }
    }

    /* Título */

    .title{
      font-size:2.4rem;
      font-weight:900;
      letter-spacing:5px;
      margin-bottom:8px;
      text-shadow:
      0 0 12px rgba(255,179,0,0.4);
    }

    .subtitle{
      color:#9f9f9f;
      font-size:0.72rem;
      letter-spacing:3px;
      margin-bottom:40px;
    }

    /* Botões */

    .button{
      width:100%;
      text-decoration:none;
      color:white;
      margin-bottom:18px;
      padding:18px;
      position:relative;
      overflow:hidden;

      border:
      1px solid rgba(255,179,0,0.25);

      background:
      linear-gradient(
      180deg,
      rgba(255,255,255,0.04),
      rgba(255,255,255,0.02));

      backdrop-filter:blur(10px);

      border-radius:14px;

      text-align:center;

      letter-spacing:2px;
      font-size:0.85rem;
      font-weight:700;

      transition:0.35s ease;
    }

    .button:hover{
      transform:translateY(-4px) scale(1.02);

      border-color:#ffb300;

      box-shadow:
      0 0 25px rgba(255,179,0,0.18),
      inset 0 0 12px rgba(255,179,0,0.08);

      background:
      linear-gradient(
      180deg,
      rgba(255,179,0,0.12),
      rgba(255,255,255,0.03));
    }

    /* Scanner */

    .button::before{
      content:"";
      position:absolute;
      top:0;
      left:-120%;
      width:60%;
      height:100%;

      background:
      linear-gradient(
      90deg,
      transparent,
      rgba(255,255,255,0.18),
      transparent);

      transform:skewX(-20deg);

      transition:0.7s;
    }

    .button:hover::before{
      left:140%;
    }

    /* Símbolo Black Corp */

    .corp{
      position:absolute;
      bottom:20px;
      right:20px;
      width:26px;
      opacity:0.18;
      transition:0.4s;
      filter:drop-shadow(0 0 8px #d2ff00);
    }

    .corp:hover{
      opacity:0.6;
      transform:scale(1.1);
    }

    /* Footer */

    .footer{
      margin-top:20px;
      font-size:0.6rem;
      letter-spacing:4px;
      color:#5a5a5a;
    }

  </style>
</head>

<body>

  <!-- Partículas -->

  <div class="particles">

    <span style="left:10%; animation-duration:12s;"></span>
    <span style="left:20%; animation-duration:18s;"></span>
    <span style="left:35%; animation-duration:14s;"></span>
    <span style="left:50%; animation-duration:20s;"></span>
    <span style="left:65%; animation-duration:16s;"></span>
    <span style="left:75%; animation-duration:12s;"></span>
    <span style="left:90%; animation-duration:22s;"></span>

  </div>

  <!-- Glow -->

  <div class="glow"></div>

  <!-- Conteúdo -->

  <div class="container">

    <!-- LOGO -->

    <img
      class="logo"

    >

      POWERED BY BLACK CORP
    </div>

    <!-- BOTÕES -->

    <a href="#" class="button">
      ACESSAR BIBLIOTECA
    </a>

    <a href="#" class="button">
      ENTRAR NO TELEGRAM
    </a>

    <a href="#" class="button">
      DESBLOQUEAR ACESSO
    </a>

    <div class="footer">
      IBRS ECOSYSTEM
    </div>

  </div>

  <!-- Easter Egg Black Corp -->

    class="corp"
    src="https://i.imgur.com/gk6C8pA.png"
    alt="Black Corp"
  >

</body>
</html>
